# deploy/docker-compose.yml
#
# Brings up: redis, two sliding-window gateways (:8081, :8082), and two
# token-bucket gateways (:8083, :8084) -- all sharing one Redis. Hitting
# both instances of the same algorithm proves the limit is enforced
# globally, not per-instance; running both algorithms side by side lets
# the load tester diff their burst/smoothing behavior with real numbers.
#
# Run from repo root:
#   docker compose -f deploy/docker-compose.yml up --build

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  sliding-window-1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      PORT: "8081"
      REDIS_ADDR: "redis:6379"
      ALGORITHM: "sliding_window"
      LIMIT: "10"
      WINDOW_SECONDS: "60"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  sliding-window-2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      PORT: "8082"
      REDIS_ADDR: "redis:6379"
      ALGORITHM: "sliding_window"
      LIMIT: "10"
      WINDOW_SECONDS: "60"
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy

  token-bucket-1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      PORT: "8083"
      REDIS_ADDR: "redis:6379"
      ALGORITHM: "token_bucket"
      CAPACITY: "10"
      REFILL_RATE: "1.0"
    ports:
      - "8083:8083"
    depends_on:
      redis:
        condition: service_healthy

  token-bucket-2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      PORT: "8084"
      REDIS_ADDR: "redis:6379"
      ALGORITHM: "token_bucket"
      CAPACITY: "10"
      REFILL_RATE: "1.0"
    ports:
      - "8084:8084"
    depends_on:
      redis:
        condition: service_healthy